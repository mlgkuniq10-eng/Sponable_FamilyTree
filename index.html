<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>

<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

<style>
html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f5f5;
}

#container{
    width:100vw;
    height:100vh;
}

svg{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="container"></div>

<script>

fetch('plain024.svg')
.then(r => r.text())
.then(svg => {

    document.getElementById("container").innerHTML = svg;

    svgPanZoom('svg',{

        zoomEnabled:true,
        controlIconsEnabled:true,
        fit:true,
        center:true,
        minZoom:0.5,
        maxZoom:30,

        mouseWheelZoomEnabled:true,

        dblClickZoomEnabled:true,

        panEnabled:true

    });

});

</script>

</body>
</html>
